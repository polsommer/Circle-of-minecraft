<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Circle of Minecraft Admin UI</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
      body { font-family: system-ui, sans-serif; margin: 2rem; }
      table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
      th, td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; }
      button { margin-right: 0.35rem; }
      .running { color: #0a7a22; font-weight: 700; }
      .stopped { color: #a80d0d; font-weight: 700; }
      .muted { color: #666; }
      pre { background: #111; color: #f3f3f3; padding: 0.75rem; overflow: auto; }
    </style>
  </head>
  <body>
    <h1>Circle of Minecraft Admin UI</h1>
    <p class="muted">Allowed servers: proxy, lobby, survival.</p>

    <button
      hx-get="/api/servers"
      hx-trigger="click, load, every 8s"
      hx-target="#servers-body"
      hx-swap="innerHTML"
      hx-on::after-request="renderRows(event.detail.xhr.responseText)"
    >
      Refresh
    </button>

    <table>
      <thead>
        <tr>
          <th>Server</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="servers-body">
        <tr><td colspan="3">Loading...</td></tr>
      </tbody>
    </table>

    <h3>Last command output</h3>
    <pre id="output">(none)</pre>

    <script>
      function renderRows(raw) {
        let data;
        try {
          data = JSON.parse(raw);
        } catch {
          document.getElementById('servers-body').innerHTML = '<tr><td colspan="3">Failed to load status</td></tr>';
          return;
        }

        const rows = (data.servers || []).map((server) => {
          const statusClass = server.status === 'running' ? 'running' : 'stopped';
          const btn = (action) => `<button onclick="runAction('${server.name}','${action}')">${action}</button>`;
          return `<tr>
            <td>${server.name}</td>
            <td class="${statusClass}">${server.status}</td>
            <td>${btn('start')}${btn('stop')}${btn('restart')}</td>
          </tr>`;
        });

        document.getElementById('servers-body').innerHTML = rows.join('') || '<tr><td colspan="3">No servers</td></tr>';
      }

      async function runAction(name, action) {
        const output = document.getElementById('output');
        output.textContent = `Running ${action} on ${name}...`;

        const response = await fetch(`/api/servers/${name}/${action}`, {
          method: 'POST',
          headers: { 'content-type': 'application/json' }
        });

        const result = await response.json();
        output.textContent = JSON.stringify(result, null, 2);

        htmx.ajax('GET', '/api/servers', '#servers-body').then((resp) => renderRows(resp));
      }
    </script>
  </body>
</html>
